name: PopOutReminders

options:
  bundleIdPrefix: com.ben
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PopOutReminders:
    type: application
    platform: macOS
    sources:
      - path: SideRemind
        excludes:
          - "Info.plist"
    info:
      path: SideRemind/Info.plist
      properties:
        CFBundleName: Pop Out Reminders
        CFBundleDisplayName: Pop Out Reminders
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: YES
        NSPrincipalClass: NSApplication
        NSRemindersUsageDescription: Pop Out Reminders needs access to your Reminders to display them in the sidebar.
        NSHumanReadableCopyright: "Copyright © 2025 Ben. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.popoutreminders
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
